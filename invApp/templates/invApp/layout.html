<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Inventory App {% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #060913;
            --nav-glass: rgba(11, 15, 25, 0.75);
            --border-glass: rgba(255, 255, 255, 0.06);
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: #f8fafc;
            padding-top: 76px;
            min-height: 100vh;
        }

        /* Ultra-Modern Glassmorphic Navbar */
        .navbar {
            background: var(--nav-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00e5ff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-link:hover, .nav-item.active .nav-link {
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Form/Table global styling integration */
        .container {
            margin-top: 30px;
        }

        /* Customizing generic bootstrap tables for high-tech look if used in blocks */
        .table {
            color: #e2e8f0 !important;
            border-color: var(--border-glass) !important;
        }
        .table th {
            background-color: rgba(255, 255, 255, 0.02) !important;
            border-color: var(--border-glass) !important;
            font-weight: 600;
        }
        .table td {
            vertical-align: middle;
            border-color: var(--border-glass) !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#00e5ff" class="bi bi-cpu-fill" viewBox="0 0 16 16">
                  <path d="M6.5 1a.5.5 0 0 0-.5.5V3h3V1.5a.5.5 0 0 0-.5-.5zM11 3.5a.5.5 0 0 0-.5-.5H9v3h3V4.5a.5.5 0 0 0-.5-.5M11 7.5a.5.5 0 0 0-.5-.5H9v3h3V8.5a.5.5 0 0 0-.5-.5M11 11.5a.5.5 0 0 0-.5-.5H9v3h3v-1.5a.5.5 0 0 0-.5-.5M6 12.5a.5.5 0 0 0-.5-.5H3v3h3v-1.5a.5.5 0 0 0-.5-.5M6 8.5a.5.5 0 0 0-.5-.5H3v3h3V9.5a.5.5 0 0 0-.5-.5M6 4.5a.5.5 0 0 0-.5-.5H3v3h3V5.5a.5.5 0 0 0-.5-.5M1 5.5a.5.5 0 0 0 .5.5H3V3H1.5a.5.5 0 0 0-.5.5zM13.5 6a.5.5 0 0 0-.5-.5H11v3h2V6.5a.5.5 0 0 0 .5-.5zm0 4a.5.5 0 0 0-.5-.5H11v3h2v-1.5a.5.5 0 0 0 .5-.5zM14 9.5a.5.5 0 0 0 .5-.5V6a.5.5 0 0 0-.5-.5h-1.5v3.5zm-13 4a.5.5 0 0 0 .5.5H3v-3H1.5a.5.5 0 0 0-.5.5zM6 15h3v-2H6z"/>
                </svg>
                <span>Inventory App</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" style="box-shadow: none;">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1 mt-2 mt-lg-0 align-items-center"> 
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="{% url 'product_create' %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-circle" viewBox="0 0 16 16">
                              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                              <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                            </svg>
                            Add Product
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="{% url 'product_list' %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-hdd-stack" viewBox="0 0 16 16">
                              <path d="M14 10a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1zm-1 2a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1m0-4a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1m-11 1a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1M14 2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1zM2 3a.5.5 0 1 0 0 1 .5.5 0 0 0 0-1m11 1a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1m-11 1a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1"/>
                            </svg>
                            Show Products
                        </a>
                    </li>

                    {% if user.is_authenticated %}
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <a class="nav-link d-flex align-items-center gap-2 text-white" href="{% url 'profile' %}" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass);">
                            <img src="{{ user.profile.image.url }}" alt="Profile" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover; border: 1px solid #00e5ff;">
                            <span>{{ user.username }}</span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                        <form action="{% url 'logout' %}" method="POST" class="d-inline m-0 p-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-danger px-3 d-flex align-items-center gap-1" style="border-radius: 8px; font-weight: 500; height: 38px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16">
                                  <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                                  <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                                </svg>
                                Log Out
                            </button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link d-flex align-items-center gap-1" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-1" href="{% url 'register' %}">
                            Register
                        </a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
