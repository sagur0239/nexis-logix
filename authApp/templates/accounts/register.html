{% load static %}  
<!DOCTYPE html>  
<html lang="en" style="background-color: #060913 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Inventory App</title> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="{% static 'styles/styles.css' %}">  

    <style>
        html, body {
            background-color: #060913 !important;
            background: #060913 !important;
            min-height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px !important;
        }

        .auth-card {
            background-color: #0b0f19 !important;
            background: #0b0f19 !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6) !important;
            border-radius: 16px !important;
        }

        /* Formatting Django's {{ form.as_p }} rows */
        .django-auth-form p {
            margin-bottom: 1.35rem !important;
            display: flex;
            flex-direction: column;
        }

        .django-auth-form label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Premium Dark Inputs */
        .django-auth-form input {
            display: block;
            width: 100%;
            padding: 0.7rem 1.1rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #f8fafc !important;
            background-color: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 10px !important;
            transition: all 0.2s ease-in-out;
        }

        .django-auth-form input:focus {
            outline: none !important;
            border-color: #00e5ff !important;
            background-color: rgba(255, 255, 255, 0.04) !important;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2) !important;
        }

        /* Hide the original raw helptext under username to clean the UI */
        .django-auth-form .helptext {
            display: none !important;
        }

        /* Dynamic placeholder styling for clean visibility */
        .django-auth-form input::placeholder {
            color: rgba(148, 163, 184, 0.45) !important;
            font-size: 0.82rem;
            font-weight: 400;
        }
        
        .django-auth-form .errorlist {
            font-size: 0.8rem;
            color: #ef4444;
            list-style: none;
            padding-left: 0;
            margin-bottom: 0.5rem;
        }

        .btn-auth-glow:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.35) !important;
        }
    </style>
</head>
<body>

    <div class="w-100 d-flex justify-content-center align-items-center" style="background: transparent !important;"> 
        <div class="card auth-card w-100 overflow-hidden" style="max-width: 480px;">
            
            <div style="height: 5px; background: linear-gradient(90deg, #6366f1 0%, #00e5ff 100%);"></div>
            
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                         style="width: 56px; height: 56px; background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.18);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#6366f1" class="bi bi-person-plus-fill" viewBox="0 0 16 16">
                          <path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                          <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
                        </svg>
                    </div>
                    <h2 class="h4 fw-bold text-white mb-1" style="letter-spacing: -0.5px;">Create Account</h2>  
                    <p class="text-white-50" style="font-size: 0.88rem;">Get started by creating your system credential profile.</p>
                </div>

                <form method="POST" action="{% url 'register' %}" id="registerForm">  
                    {% csrf_token %}  
                    
                    <div class="django-auth-form text-start">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid mt-4 pt-2">
                        <button type="submit" class="btn btn-auth-glow text-white fw-bold py-2.5 rounded-3 border-0 transition-all"
                                style="background: linear-gradient(135deg, #6366f1 0%, #00e5ff 100%); font-size: 0.95rem; letter-spacing: 0.3px;">
                            Register Account
                        </button> 
                    </div>
                </form> 

                <div class="text-center mt-4 pt-2">
                    <p class="mb-0 text-white-50" style="font-size: 0.88rem;">
                        Already have an account? 
                        <a href="{% url 'login' %}" class="text-info text-decoration-none fw-semibold ms-1" style="color: #00e5ff !important;">Login here</a>
                    </p>  
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Find the username input field inside the form
            const usernameInput = document.querySelector('.django-auth-form input[name="username"]');
            
            if (usernameInput) {
                // Set the exact required rules as a clean placeholder inside the input field
                usernameInput.setAttribute('placeholder', 'Max 150 chars. Letters, digits and @/./+/-/_ only.');
            }
            
            // Optional: Add simple password placeholders for consistent look
            const passwordInput = document.querySelector('.django-auth-form input[name="password1"]');
            const confirmPasswordInput = document.querySelector('.django-auth-form input[name="password2"]');
            
            if (passwordInput) passwordInput.setAttribute('placeholder', 'Enter strong password');
            if (confirmPasswordInput) confirmPasswordInput.setAttribute('placeholder', 'Confirm your password');
        });
    </script>
</body>
</html>
