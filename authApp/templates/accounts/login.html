{% load static %}  
<!DOCTYPE html>  
<html lang="en" style="background-color: #030712 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NEXIS LOGIX Control Deck</title> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="{% static 'styles/styles.css' %}">  

    <style>
        html, body, .container-fluid, .wrapper {
            background-color: #030712 !important;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 229, 255, 0.03), transparent),
                        #030712 !important;
            min-height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px !important;
        }

        /* Ultra Premium Cyber Glass Card Container */
        .auth-card {
            background: rgba(11, 15, 25, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7), 
                        0 0 80px rgba(99, 102, 241, 0.05) !important;
            border-radius: 24px !important;
        }

        /* Cyberpunk Interactive Badge */
        .site-badge {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: #00e5ff;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 18px;
            border-radius: 100px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        /* Sci-Fi Metallic Text Gradient */
        .site-title {
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1.5px;
        }

        /* Django {{ form.as_p }} Dynamic Styles */
        .django-auth-form p {
            margin-bottom: 1.6rem !important;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .django-auth-form label {
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        /* Glassmorphic Cyber Input Fields */
        .django-auth-form input {
            display: block;
            width: 100%;
            padding: 0.85rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #ffffff !important;
            background: rgba(3, 7, 18, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.07) !important;
            border-radius: 14px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .django-auth-form p:focus-within label {
            color: #00e5ff;
        }

        .django-auth-form input:focus {
            outline: none !important;
            border-color: #6366f1 !important;
            background: rgba(3, 7, 18, 0.9) !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2),
                        inset 0 0 10px rgba(99, 102, 241, 0.1) !important;
            transform: scale(1.01);
        }

        /* Premium Glow Button Custom Style */
        .btn-auth-glow {
            background: linear-gradient(135deg, #00e5ff 0%, #6366f1 50%, #4f46e5 100%);
            background-size: 200% auto;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25) !important;
            transition: all 0.4s ease;
        }

        .btn-auth-glow:hover {
            background-position: right center;
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.4) !important;
        }

        .django-auth-form .errorlist {
            font-size: 0.8rem;
            color: #f87171;
            margin-top: 0.5rem;
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="w-100 d-flex justify-content-center align-items-center" style="background: transparent !important;"> 
        <div class="card auth-card w-100 overflow-hidden" style="max-width: 460px;">
            
            <div style="height: 4px; background: linear-gradient(90deg, #00e5ff 0%, #6366f1 50%, #00e5ff 100%);"></div>
            
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <div class="mb-3">
                        <span class="site-badge">v2.4 Core Online</span>
                    </div>
                    
                    <h1 class="site-title mb-2">NEXIS LOGIX</h1>
                    <p class="text-white-50" style="font-size: 0.85rem; line-height: 1.5; letter-spacing: 0.2px;">
                        Autonomous Asset & Inventory Matrix. <br>Authorized operators only. Initialize credentials below.
                    </p>
                </div>

                {% if error %}  
                    <div class="alert border-0 rounded-3 text-start py-2.5 px-3 mb-4 d-flex align-items-center gap-2" 
                         style="background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.15) !important; color: #f87171; font-size: 0.85rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-exclamation-circle-fill" viewBox="0 0 16 16">
                          <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8 4a.905.905 0 0 0-.9.995l.35 3.507a.552.552 0 0 0 1.1 0l.35-3.507A.905.905 0 0 0 8 4zm.002 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
                        </svg>
                        <span>{{ error }}</span>
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}" autocomplete="off">  
                    {% csrf_token %}  
                    <input type="hidden" name="next" value="{{ next }}">
                    
                    <div class="django-auth-form text-start">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid mt-4 pt-2">
                        <button type="submit" class="btn btn-auth-glow text-white fw-bold py-3 rounded-3 border-0"
                                style="font-size: 0.95rem; letter-spacing: 1px;">
                            AUTHENTICATE SESSION
                        </button> 
                    </div>
                </form> 

                <div class="text-center mt-5">
                    <p class="mb-0 text-white-50" style="font-size: 0.85rem;">
                        New operative terminal? 
                        <a href="{% url 'register' %}" class="text-decoration-none fw-semibold ms-1" style="color: #00e5ff !important; letter-spacing: 0.3px;">Register Node</a>
                    </p>  
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const inputs = document.querySelectorAll('.django-auth-form input');
                inputs.forEach(input => {
                    input.setAttribute('autocomplete', 'new-password');
                    if (input.value !== '') {
                        input.value = '';
                    }
                });
            }, 50);
        });
    </script>
</body>
</html>
